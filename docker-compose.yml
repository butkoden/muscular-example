services:
  web:
    build:
      context: ..
      dockerfile: muscular-example/Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12-slim}
    ports:
      - "8080:8080"
    environment:
      MUSCULAR_EXAMPLE_DB: /app/muscular-example/data/example_4.sqlite3
      MUSCULAR_EXAMPLE_ADMIN_PASSWORD: admin
    volumes:
      - ./data:/app/muscular-example/data
      - ../muscles/src:/app/muscles/src
      - ../muscles-wsgi/src:/app/muscles-wsgi/src
      - ../muscles-asgi/src:/app/muscles-asgi/src
      - ../muscles-cli/src:/app/muscles-cli/src
      - ../muscles-sql/src:/app/muscles-sql/src
      - ../muscles-ai/src:/app/muscles-ai/src
      - ../muscles-documents/src:/app/muscles-documents/src
      - ../muscles-jsonrpc/src:/app/muscles-jsonrpc/src
      - ../muscles-sse/src:/app/muscles-sse/src
      - ../muscles-otel/src:/app/muscles-otel/src
      - ../muscles-mcp/src:/app/muscles-mcp/src
      - .:/app/muscular-example
